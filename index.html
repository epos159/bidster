    const getItemName = (item) => typeof item === 'string' ? item : item.name;
    const getItemSubItems = (item) => typeof item === 'string' ? null : (item.subItems || null);

    // ---------- Logo ----------
    const Logo = ({ size = 40 }) => (
      <svg width={size} height={size} viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="44" height="44" rx="6" fill="#1B2A3A"/>
        <path d="M14 10h12c4.5 0 8 2.6 8 7 0 2.8-1.4 4.8-3.5 5.9 2.9 1 4.9 3.3 4.9 6.6 0 4.9-3.9 7.5-8.9 7.5H14V10z" fill="#F7F6F2"/>
        <path d="M19 15v6.5h6.3c2.2 0 3.7-1.2 3.7-3.2S27.5 15 25.3 15H19zm0 11.5V32h7c2.4 0 4-1.3 4-3.3s-1.6-2.2-4-2.2h-7z" fill="#1B2A3A"/>
        <path d="M30 34l5-9 3.5 2-6 10.5L30 34z" fill="#F59E0B"/>
        <path d="M27 31.5l3 2.5-1.5 3.5-4-2.5 2.5-3.5z" fill="#F59E0B"/>
      </svg>
    );

    const CheckIcon = ({ className = "w-4 h-4" }) => (
      <svg className={className} fill="currentColor" viewBox="0 0 20 20">
        <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
      </svg>
    );

    const Bidster = () => {
      const [selectedProjects, setSelectedProjects] = useState([]);
      const [checklist, setChecklist] = useState({});
      const [notes, setNotes] = useState({});
      const [jobName, setJobName] = useState('');
      const [roomDimensions, setRoomDimensions] = useState('');
      const [subItemData, setSubItemData] = useState({});

      useEffect(() => {
        const saved = localStorage.getItem('bidster-data');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            setSelectedProjects(data.selectedProjects || []);
            setChecklist(data.checklist || {});
            setNotes(data.notes || {});
            setJobName(data.jobName || '');
            setRoomDimensions(data.roomDimensions || '');
            setSubItemData(data.subItemData || {});
          } catch (e) { /* corrupted state, start clean */ }
        }
      }, []);

      useEffect(() => {
        localStorage.setItem('bidster-data', JSON.stringify({
          selectedProjects, checklist, notes, jobName, roomDimensions, subItemData
        }));
      }, [selectedProjects, checklist, notes, jobName, roomDimensions, subItemData]);

      const toggleProject = (project) => {
        setSelectedProjects(prev =>
          prev.includes(project) ? prev.filter(p => p !== project) : [...prev, project]
        );
      };

      const toggleItem = (name) => setChecklist(prev => ({ ...prev, [name]: !prev[name] }));
      const updateNote = (name, note) => setNotes(prev => ({ ...prev, [name]: note }));
      const toggleSubItem = (k) => setSubItemData(prev => ({ ...prev, [k]: { ...prev[k], checked: !prev[k]?.checked } }));
      const updateSubItemQty = (k, qty) => setSubItemData(prev => ({ ...prev, [k]: { ...prev[k], qty } }));
      const updateSubItemValue = (k, value) => setSubItemData(prev => ({ ...prev, [k]: { ...prev[k], value } }));

      const getCombinedItems = () => {
        const map = new Map();
        selectedProjects.forEach(project => {
          projectTypes[project].items.forEach(item => {
            const name = getItemName(item);
            const existing = map.get(name);
            if (!existing || (!getItemSubItems(existing) && getItemSubItems(item))) {
              map.set(name, item);
            }
          });
        });
        return Array.from(map.values());
      };

      const combined = getCombinedItems();
      const checkedCount = combined.filter(item => checklist[getItemName(item)]).length;

      const buildExportText = () => {
        const timestamp = new Date().toLocaleString();
        const projects = selectedProjects.map(p => projectTypes[p].label).join(', ');
        let text = `BIDSTER FIELD CHECKLIST\n=======================\n`;
        if (jobName) text += `Job: ${jobName}\n`;
        if (roomDimensions) text += `Dimensions: ${roomDimensions}\n`;
        text += `Date: ${timestamp}\nProjects: ${projects}\nIn scope: ${checkedCount}/${combined.length}\n\n`;
        combined.forEach(item => {
          const name = getItemName(item);
          const subItems = getItemSubItems(item);
          const isChecked = checklist[name];
          text += `[${isChecked ? 'x' : ' '}] ${name}${notes[name] ? ` — ${notes[name]}` : ''}\n`;
          if (isChecked && subItems) {
            subItems.forEach(sub => {
              const subData = subItemData[`${name}__${sub.label}`];
              if (sub.type === 'notes' || sub.type === 'select') {
                if (subData?.value) text += `      · ${sub.label}: ${subData.value}\n`;
              } else if (subData?.checked) {
                const qtyStr = sub.type === 'qty' && subData?.qty ? ` (qty: ${subData.qty})` : '';
                text += `      [x] ${sub.label}${qtyStr}\n`;
              }
            });
          }
        });
        return text;
      };

      const shareData = () => {
        const text = buildExportText();
        if (navigator.share) {
          navigator.share({ title: 'Bidster Checklist', text }).catch(() => {});
        } else {
          navigator.clipboard.writeText(text).then(() => alert('Checklist copied to clipboard'));
        }
      };

      const printData = () => {
        const timestamp = new Date().toLocaleString();
        const projects = selectedProjects.map(p => projectTypes[p].label).join(', ');
        let html = `<html><head><title>Bidster Checklist</title><style>
          body { font-family: Arial, sans-serif; padding: 24px; color: #1B2A3A; }
          .tb { border: 2px solid #1B2A3A; margin-bottom: 20px; }
          .tb-row { display: flex; border-top: 1.5px solid #1B2A3A; }
          .tb-row:first-child { border-top: none; }
          .tb-cell { padding: 6px 10px; flex: 1; }
          .tb-cell + .tb-cell { border-left: 1.5px solid #1B2A3A; }
          .tb-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #6b7280; display:block; }
          .tb-value { font-size: 14px; font-weight: 600; }
          .brand { font-size: 20px; font-weight: 800; letter-spacing: 0.02em; padding: 8px 10px; }
          .item { margin-bottom: 10px; page-break-inside: avoid; }
          .checkbox { display: inline-block; width: 14px; height: 14px; border: 1.5px solid #1B2A3A; margin-right: 8px; vertical-align: -2px; }
          .checked { background: #1B2A3A; }
          .item-name { font-weight: 600; font-size: 14px; }
          .notes { margin-left: 24px; font-size: 12px; color: #555; }
          .subitem { margin-left: 24px; font-size: 12px; color: #333; margin-top: 3px; }
          .sub-box { display: inline-block; width: 10px; height: 10px; border: 1px solid #444; background: #444; margin-right: 6px; }
          .footer { margin-top: 48px; text-align: center; font-size: 10px; color: #b9b5ac; letter-spacing: 0.08em; text-transform: uppercase; }
        </style></head><body>`;
        html += `<div class="tb">
          <div class="tb-row"><div class="brand">BIDSTER — FIELD CHECKLIST</div></div>
          <div class="tb-row">
            <div class="tb-cell"><span class="tb-label">Job</span><span class="tb-value">${jobName || '—'}</span></div>
            <div class="tb-cell"><span class="tb-label">Dimensions</span><span class="tb-value">${roomDimensions || '—'}</span></div>
          </div>
          <div class="tb-row">
            <div class="tb-cell"><span class="tb-label">Projects</span><span class="tb-value">${projects}</span></div>
            <div class="tb-cell"><span class="tb-label">Date</span><span class="tb-value">${timestamp}</span></div>
            <div class="tb-cell"><span class="tb-label">In scope</span><span class="tb-value">${checkedCount}/${combined.length}</span></div>
          </div>
        </div>`;
        combined.forEach(item => {
          const name = getItemName(item);
          const subItems = getItemSubItems(item);
          const isChecked = checklist[name];
          let subHtml = '';
          if (isChecked && subItems) {
            subItems.forEach(sub => {
              const subData = subItemData[`${name}__${sub.label}`];
              if (sub.type === 'notes' || sub.type === 'select') {
                if (subData?.value) subHtml += `<div class="subitem">${sub.label}: ${subData.value}</div>`;
              } else if (subData?.checked) {
                const qtyStr = sub.type === 'qty' && subData?.qty ? ` (qty: ${subData.qty})` : '';
                subHtml += `<div class="subitem"><span class="sub-box"></span>${sub.label}${qtyStr}</div>`;
              }
            });
          }
          html += `<div class="item">
            <span class="checkbox ${isChecked ? 'checked' : ''}"></span>
            <span class="item-name">${name}</span>
            ${notes[name] ? `<div class="notes">${notes[name]}</div>` : ''}
            ${subHtml}
          </div>`;
        });
        html += `<div class="footer">Bidster · A Posch Ventures Tool · poschventures.com</div></body></html>`;
        const w = window.open('', '', 'width=800,height=600');
        w.document.write(html);
        w.document.close();
        setTimeout(() => w.print(), 250);
      };

      const clearAll = () => {
        if (window.confirm('Clear all data and start fresh?')) {
          setSelectedProjects([]); setChecklist({}); setNotes({});
          setJobName(''); setRoomDimensions(''); setSubItemData({});
        }
      };

      const getNotePlaceholder = (name) => {
        if (name.includes('Plumbing rough-in')) return 'Joist direction? Water routing?';
        if (name.includes('Windows')) return 'Qty? Size? Style?';
        if (name === 'Doors (exterior)' || name === 'Interior doors' || name === 'Door') return 'Qty? Style?';
        if (name.includes('Shower/tub')) return 'Combo, shower-only, or tub-only?';
        if (name.includes('Surround')) return 'Tile (which?), vinyl, or Schlüter?';
        if (name.includes('Framing')) return 'Joist direction documented?';
        if (name.includes('Pot filler')) return 'Good upsell — confirm gas or electric before rough-in';
        if (name.includes('Backsplash')) return 'Tile, subway, other? Size?';
        return 'Notes — measurements, details, issues';
      };

      return (
        <div className="min-h-screen pb-28">
          {/* ---------- Title block header ---------- */}
          <div className="max-w-2xl mx-auto px-4 pt-6">
            <div className="titleblock bg-white">
              <div className="titleblock-row flex items-center gap-3 px-4 py-3">
                <Logo size={40} />
                <div className="flex-1">
                  <h1 className="display text-2xl font-bold tracking-wide leading-none" style={{color:'var(--ink)'}}>BIDSTER</h1>
                  <p className="text-[11px] mt-0.5 tracking-wide" style={{color:'rgba(27,42,58,0.6)'}}>Field checklist for estimators — don't miss a thing</p>
                </div>
                {combined.length > 0 && (
                  <div className="text-right">
                    <span className="tb-label block">In scope</span>
                    <span className="display text-xl font-bold" style={{color:'var(--amber-deep)'}}>{checkedCount}<span className="text-sm font-semibold" style={{color:'rgba(27,42,58,0.45)'}}>/{combined.length}</span></span>
                  </div>
                )}
              </div>
              <div className="titleblock-row flex">
                <div className="flex-1 px-4 py-2" style={{borderRight:'1.5px solid var(--ink)'}}>
                  <span className="tb-label block">Job / Address</span>
                  <input
                    type="text" value={jobName}
                    onChange={(e) => setJobName(e.target.value)}
                    placeholder="—"
                    className="w-full bg-transparent text-sm font-semibold placeholder-slate-300"
                    style={{color:'var(--ink)'}}
                  />
                </div>
                <div className="flex-1 px-4 py-2">
                  <span className="tb-label block">Dimensions</span>
                  <input
                    type="text" value={roomDimensions}
                    onChange={(e) => setRoomDimensions(e.target.value)}
                    placeholder="e.g. 10x12"
                    className="w-full bg-transparent text-sm font-semibold placeholder-slate-300"
                    style={{color:'var(--ink)'}}
                  />
                </div>
              </div>
            </div>
          </div>

          {/* ---------- Project selector ---------- */}
          <div className="max-w-2xl mx-auto px-4 mt-5">
            <span className="tb-label block mb-2">Project type — select all that apply</span>
            <div className="flex flex-wrap gap-2">
              {Object.entries(projectTypes).map(([key, config]) => {
                const active = selectedProjects.includes(key);
                return (
                  <button
                    key={key}
                    onClick={() => toggleProject(key)}
                    className="display text-sm font-semibold tracking-wide px-3.5 py-2 border-2 transition-all"
                    style={active
                      ? { background: 'var(--ink)', borderColor: 'var(--ink)', color: '#fff' }
                      : { background: '#fff', borderColor: 'rgba(27,42,58,0.25)', color: 'var(--ink)' }}
                  >
                    {active && <span style={{color:'var(--amber)'}}>✓ </span>}{config.label.toUpperCase()}
                  </button>
                );
              })}
            </div>
          </div>

          {/* ---------- Checklist ---------- */}
          <div className="max-w-2xl mx-auto px-4 mt-5">
            {selectedProjects.length === 0 ? (
              <div className="bg-white border-2 border-dashed p-12 text-center" style={{borderColor:'rgba(27,42,58,0.2)'}}>
                <p className="display text-lg font-semibold tracking-wide" style={{color:'rgba(27,42,58,0.45)'}}>SELECT A PROJECT TYPE TO BEGIN</p>
                <p className="text-xs mt-1" style={{color:'rgba(27,42,58,0.4)'}}>Check items that are in scope for this bid</p>
              </div>
            ) : (
              <div className="bg-white border-2" style={{borderColor:'var(--ink)'}}>
                {combined.map((item, idx) => {
                  const name = getItemName(item);
                  const subItems = getItemSubItems(item);
                  const isChecked = checklist[name];
                  return (
                    <div key={name} className="px-4 py-3" style={{borderTop: idx === 0 ? 'none' : '1px solid rgba(27,42,58,0.12)'}}>
                      <div className="flex gap-3 items-center">
                        <button
                          onClick={() => toggleItem(name)}
                          className="flex-shrink-0 w-7 h-7 border-2 flex items-center justify-center transition-all text-white"
                          style={isChecked
                            ? { background: 'var(--check)', borderColor: 'var(--check)' }
                            : { background: '#fff', borderColor: 'rgba(27,42,58,0.3)' }}
                          aria-label={isChecked ? `Remove ${name} from scope` : `Add ${name} to scope`}
                        >
                          {isChecked && <CheckIcon />}
                        </button>
                        <span className={`text-[15px] leading-snug ${isChecked ? 'font-bold' : 'font-normal'}`}
                          style={{color: isChecked ? 'var(--ink)' : 'rgba(27,42,58,0.4)'}}>
                          {name}
                        </span>
                      </div>

                      {isChecked && (
                        <div className="mt-2.5 ml-10 space-y-2.5">
                          <textarea
                            value={notes[name] || ''}
                            onChange={(e) => updateNote(name, e.target.value)}
                            placeholder={getNotePlaceholder(name)}
                            rows="2"
                            className="w-full p-2 text-[13px] border bg-white placeholder-slate-400 resize-none focus:ring-2"
                            style={{borderColor:'rgba(27,42,58,0.2)'}}
                          />

                          {subItems && (
                            <div className="space-y-2.5 pl-3" style={{borderLeft:'3px solid var(--amber)'}}>
                              {subItems.map(sub => {
                                const subKey = `${name}__${sub.label}`;
                                const subData = subItemData[subKey] || {};

                                if (sub.type === 'select') {
                                  return (
                                    <div key={sub.label}>
                                      <span className="text-xs font-medium block mb-1" style={{color:'rgba(27,42,58,0.65)'}}>{sub.label}</span>
                                      <div className="flex gap-1.5">
                                        {sub.options.map(opt => {
                                          const on = subData.value === opt;
                                          return (
                                            <button key={opt}
                                              onClick={() => updateSubItemValue(subKey, on ? '' : opt)}
                                              className="flex-1 py-2 text-xs font-semibold border-2 transition-colors"
                                              style={on
                                                ? { background: 'var(--check)', borderColor: 'var(--check)', color: '#fff' }
                                                : { background: '#fff', borderColor: 'rgba(27,42,58,0.2)', color: 'rgba(27,42,58,0.7)' }}>
                                              {opt}
                                            </button>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  );
                                }

                                if (sub.type === 'notes') {
                                  return (
                                    <div key={sub.label}>
                                      <span className="text-xs font-medium block mb-1" style={{color:'rgba(27,42,58,0.65)'}}>{sub.label}</span>
                                      <input
                                        type="text"
                                        value={subData.value || ''}
                                        onChange={(e) => updateSubItemValue(subKey, e.target.value)}
                                        className="w-full p-2 text-xs border bg-white"
                                        style={{borderColor:'rgba(27,42,58,0.2)'}}
                                      />
                                    </div>
                                  );
                                }

                                return (
                                  <div key={sub.label} className="flex items-center gap-2.5">
                                    <button
                                      onClick={() => toggleSubItem(subKey)}
                                      className="flex-shrink-0 w-5 h-5 border-2 flex items-center justify-center text-white"
                                      style={subData.checked
                                        ? { background: 'var(--check)', borderColor: 'var(--check)' }
                                        : { background: '#fff', borderColor: 'rgba(27,42,58,0.25)' }}>
                                      {subData.checked && <CheckIcon className="w-3 h-3" />}
                                    </button>
                                    <span className="text-[13px]" style={{color:'rgba(27,42,58,0.8)'}}>{sub.label}</span>
                                    {sub.type === 'qty' && subData.checked && (
                                      <input
                                        type="number" min="0"
                                        value={subData.qty || ''}
                                        onChange={(e) => updateSubItemQty(subKey, e.target.value)}
                                        placeholder="Qty"
                                        className="w-16 p-1.5 text-xs border text-center"
                                        style={{borderColor:'rgba(27,42,58,0.25)'}}
                                      />
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ---------- Footer credit ---------- */}
          <div className="max-w-2xl mx-auto px-4 mt-6 text-center">
            <p className="tb-label">Bidster · A Posch Ventures tool</p>
          </div>

          {/* ---------- Action bar ---------- */}
          {selectedProjects.length > 0 && (
            <div className="fixed bottom-0 left-0 right-0 p-3" style={{background:'linear-gradient(transparent, var(--paper) 30%)'}}>
              <div className="max-w-2xl mx-auto flex gap-2">
                <button onClick={shareData}
                  className="display flex-1 py-3.5 text-base font-bold tracking-widest text-white border-2 transition-colors flex items-center justify-center gap-2"
                  style={{background:'var(--amber-deep)', borderColor:'var(--amber-deep)'}}>
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z" />
                  </svg>
                  SHARE
                </button>
                <button onClick={printData}
                  className="display flex-1 py-3.5 text-base font-bold tracking-widest border-2 transition-colors flex items-center justify-center gap-2"
                  style={{background:'var(--ink)', borderColor:'var(--ink)', color:'#fff'}}>
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0110.56 0m-10.56 0L6 18.25m0-4.421l.72.096m10.56 0l.72-.096m-.72.096L18 18.25m-1.44-4.517c.24.03.48.062.72.096m-12 0V9.75A2.25 2.25 0 017.53 7.5h8.94a2.25 2.25 0 012.25 2.25v4.079" />
                  </svg>
                  PRINT
                </button>
                <button onClick={clearAll}
                  className="flex-shrink-0 px-4 border-2 transition-colors"
                  style={{background:'#fff', borderColor:'rgba(27,42,58,0.25)', color:'var(--ink)'}}
                  aria-label="Clear all data">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                  </svg>
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Bidster />);
  </script>
</body>
</html>
